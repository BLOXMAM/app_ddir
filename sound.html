<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة تشغيل الصوت</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .audio-card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>

<style id="admin-styles">
        :root {
            --drawer-bg-light: #2c3e50; /* light-bg-var */
            --drawer-text-light: #ffffff; /* light-text-var */
            --drawer-bg-dark: #1a252f; /* dark-bg-var */
            --drawer-text-dark: #ecf0f1; /* dark-text-var */
            --header-bg: var(--drawer-bg-dark);
            --header-text: var(--drawer-text-dark);
            --drawer-menu-bg: #2c3e50;
            --drawer-item-color: #ecf0f1;
        }
        * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        }
        body { margin: 0 !important; padding-top: 56px !important; }
        header { position: fixed !important; top: 0 !important; left: 0 !important; z-index: 1000 !important; background: var(--header-bg) !important; height: 56px !important; line-height: 56px !important; padding: 0 15px !important; color: var(--header-text) !important; display: flex; align-items: center; justify-content: flex-start; width: 100% !important; max-width: 100% !important; min-width: 100% !important; box-sizing: border-box; direction: rtl; gap: 15px; overflow: hidden !important; }
        .header-brand { display: flex; align-items: center; gap: 15px; width: auto; text-align: right; }
        
        .menu-btn-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            box-sizing: border-box;
            transition: transform 0.15s ease;
            margin-top: auto;
            margin-bottom: auto;
        }
        .menu-btn-container:active {
            transform: scale(0.85);
        }
        .menu-bar-line {
            width: 100%;
            height: 3px;
            background-color: var(--header-text);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-origin: right center;
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(1) {
            transform: rotate(-45deg);
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(3) {
            transform: rotate(45deg);
        }
        
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: none; }
        .drawer { position: fixed; top: 0; width: 280px; height: 100%; background: var(--drawer-menu-bg) !important; z-index: 1002; transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); display: flex; flex-direction: column; right: -280px; }
        .drawer.open { right: 0; }
        .drawer-header { background: var(--header-bg); color: var(--header-text); height: 56px !important; line-height: 56px !important; padding: 0 15px !important; font-weight: bold; text-align: right; box-sizing: border-box; overflow: hidden !important; }
        .drawer-menu-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .drawer-menu-container::-webkit-scrollbar { display: none; }
        .drawer-menu { list-style: none; padding: 10px 0; margin: 0; direction: rtl; }
        .drawer-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--drawer-item-color) !important; transition: all 0.2s ease; outline: none; -webkit-tap-highlight-color: transparent; }
        .drawer-item:hover { background-color: rgba(0,0,0,0.05); transform: translateX(-4px); color: var(--header-bg) !important; }
        .drawer-item:active { background-color: rgba(0,0,0,0.1) !important; transform: scale(0.98) !important; transition: transform 0.05s ease; }
        .drawer-loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--header-bg); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<!-- START ADMIN DRAWER -->
<header data-header-theme="dark">
    <button class="menu-btn-container" id="menuBtnToggle" onclick="toggleDrawer()">
        <div class="menu-bar-line"></div>
        <div class="menu-bar-line"></div>
        <div class="menu-bar-line"></div>
    </button>
    <span id="pageMainHeader" style="font-weight:bold; font-size: 1.1rem; display: inline-block; vertical-align: middle;">sound</span>
</header>
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
    <div class="drawer-header" id="drawerSideHeader">sound</div>
    <div id="drawerLoader" class="drawer-loader"></div>
    <div class="drawer-menu-container">
        <ul class="drawer-menu" id="drawerDynamicMenu"></ul>
    </div>
</nav>
<!-- END ADMIN DRAWER -->


<div class="audio-card">
    <div class="icon">🎵</div>
    <h1>صفحة تجربة الصوت</h1>
    <p style="color: #94a3b8;">اضغط على زر التشغيل في الأسفل للاستماع</p>
    
    <!-- استبدل الرابط أدناه برابط ملف الصوت الخاص بك إذا أردت -->
    <audio controls>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        متصفحك لا يدعم تشغيل الصوت.
    </audio>
</div>


<script id="admin-scripts">
    const username = "BLOXMAM";
    const repo = "app_ddir";
    const currentFileName = "sound.html";

    function toggleDrawer() {
        const drawer = document.getElementById("drawer");
        const overlay = document.getElementById("drawerOverlay");
        const menuBtn = document.getElementById("menuBtnToggle");
        
        drawer.classList.toggle("open");
        
        if(drawer.classList.contains("open")) {
            overlay.style.display = "block";
            menuBtn.classList.add("active-icon");
        } else {
            overlay.style.display = "none";
            menuBtn.classList.remove("active-icon");
        }
    }

    function renderDrawerContent(orderedPages) {
        const drawerMenu = document.getElementById("drawerDynamicMenu");
        drawerMenu.innerHTML = "";
        const currentPageData = orderedPages.find(p => p.file === currentFileName);
        if (currentPageData && currentPageData.title) {
            document.getElementById("pageMainHeader").innerText = currentPageData.title;
            if(document.getElementById("drawerSideHeader")) document.getElementById("drawerSideHeader").innerText = currentPageData.title;
            if(document.getElementById("pageContentTitle")) document.getElementById("pageContentTitle").innerText = currentPageData.title;
            document.title = currentPageData.title;
        }
        orderedPages.forEach(page => {
            const li = document.createElement("li");
            li.className = "drawer-item";
            li.innerHTML = "<span>" + page.title + "</span>";
            li.onclick = () => {
                if (typeof Android !== "undefined" && Android.openLocalPage) {
                    Android.openLocalPage(page.file);
                } else {
                    window.location.href = page.file;
                }
            };
            drawerMenu.appendChild(li);
        });
    }

    async function initDrawer() {
        const loader = document.getElementById("drawerLoader");
        let loadedSuccessfully = false;
        try {
            if (typeof Android !== "undefined" && Android.readLocalFile) {
                const localData = Android.readLocalFile("order.json");
                if (localData && localData.trim() !== "") {
                    const orderedPages = JSON.parse(localData);
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                }
            }
            if (!loadedSuccessfully) {
                const res = await fetch(`order.json`);
                if (res.ok) {
                    const orderedPages = await res.json();
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                } else { throw new Error(); }
            }
        } catch(e) { 
            if (!loadedSuccessfully) {
                try {
                    const resAlt = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/order.json`);
                    const dataAlt = await resAlt.json();
                    const decodedContent = decodeURIComponent(escape(atob(dataAlt.content.replace(/\s/g, ""))));
                    renderDrawerContent(JSON.parse(decodedContent));
                } catch(err) { console.log("خطأ في جلب الهيدر"); }
            }
        } finally {
            if(loader) loader.style.display = "none";
        }
    }
    initDrawer();
</script>
</body>
</html>
