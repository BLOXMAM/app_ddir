<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Snake Game Fixed</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #canvas-container {
            flex: 6; /* يأخذ 60% من الارتفاع تلقائياً */
            width: 100%;
            position: relative;
            background-color: #111;
        }
        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        #controls {
            flex: 4; /* يأخذ 40% من الارتفاع تلقائياً */
            width: 100%;
            background-color: #222;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            align-items: center;
            justify-items: center;
            padding: 10px;
            border-top: 2px solid #333;
        }
        .btn {
            width: 70px;
            height: 70px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            background-color: #666;
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        
        #restartBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            font-size: 18px;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 5px;
            display: none;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>


<style id="admin-styles">
        :root { --primary-color: #2c3e50; --accent-color: #16a085; --card-bg: #ffffff; }
        header { background: var(--primary-color); padding: 15px; color: white; display: flex; align-items: center; justify-content: space-between; }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: none; }
        .drawer { position: fixed; top: 0; width: 280px; height: 100%; background: var(--card-bg); z-index: 1002; transition: all 0.3s ease; display: flex; flex-direction: column; left: -280px; }
        .drawer.open { left: 0; }
        .drawer-header { background: var(--primary-color); color: white; padding: 20px; font-weight: bold; }
        .drawer-menu { list-style: none; padding: 10px 0; margin: 0; }
        .drawer-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .drawer-loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent-color); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<!-- START ADMIN DRAWER -->
<header>
    <div class="header-brand" style="flex-direction: row-reverse;">
        <button onclick="toggleDrawer()" style="background:none; border:none; font-size:24px; cursor:pointer; color:white; padding:0; display:flex; align-items:center;">☰</button>
        <span id="pageMainHeader" style="font-weight:bold;">mix</span>
    </div>
</header>
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
    <div class="drawer-header">تصفح السور والصفحات</div>
    <div id="drawerLoader" class="drawer-loader"></div>
    <ul class="drawer-menu" id="drawerDynamicMenu"></ul>
</nav>
<!-- END ADMIN DRAWER -->



    <div id="canvas-container">
        <div id="ui">
            <div id="score">النقاط: 0</div>
            <div id="status">لعبة الثعبان 3D</div>
        </div>
        <button id="restartBtn" onclick="resetGame()">إعادة اللعب</button>
    </div>
    
    <div id="controls">
        <button class="btn" id="btnUp" onclick="changeDirection('UP')">▲</button>
        <button class="btn" id="btnLeft" onclick="changeDirection('LEFT')">◀</button>
        <button class="btn" id="btnRight" onclick="changeDirection('RIGHT')">▶</button>
        <button class="btn" id="btnDown" onclick="changeDirection('DOWN')">▼</button>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        
        // حساب الأبعاد بناءً على الحاوية وليس نافذة الشاشة الكاملة
        let width = container.clientWidth;
        let height = container.clientHeight;

        // إعداد المشهد والكاميرا
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(0, 16, 14); // تعديل زاوية الكاميرا لتكون أوضح
        camera.lookAt(0, 0, -1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        container.appendChild(renderer.domElement);

        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 20, 5);
        scene.add(dirLight);

        // إعدادات الحقل
        const gridSize = 14; 
        const gridGeo = new THREE.BoxGeometry(gridSize, 0.2, gridSize);
        const gridMat = new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.8 });
        const grid = new THREE.Mesh(gridGeo, gridMat);
        grid.position.set(0, -0.1, 0);
        scene.add(grid);

        // خطوط الحدود
        const edges = new THREE.EdgesGeometry(gridGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
        line.position.set(0, -0.1, 0);
        scene.add(line);

        // متغيرات اللعبة
        let snake = [];
        let snakeData = []; 
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let food;
        let foodPos = { x: 0, z: 0 };
        let score = 0;
        let gameOver = false;
        
        let moveInterval = 0.25; 
        let lastMoveTime = 0;

        const headMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 }); 
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x81c784 }); 
        const foodMat = new THREE.MeshStandardMaterial({ color: 0xff5722 }); 
        const boxGeo = new THREE.BoxGeometry(0.85, 0.85, 0.85);

        function initGame() {
            snakeData = [
                { x: 1, z: 0 },
                { x: 0, z: 0 },
                { x: -1, z: 0 }
            ];

            snakeData.forEach((pos, index) => {
                const mesh = new THREE.Mesh(boxGeo, index === 0 ? headMat : bodyMat);
                mesh.position.set(pos.x, 0.4, pos.z);
                scene.add(mesh);
                snake.push(mesh);
            });

            spawnFood();
        }

        function spawnFood() {
            if (food) scene.remove(food);

            let valid = false;
            while (!valid) {
                foodPos.x = Math.floor(Math.random() * (gridSize - 2)) - (gridSize/2 - 1);
                foodPos.z = Math.floor(Math.random() * (gridSize - 2)) - (gridSize/2 - 1);
                valid = !snakeData.some(segment => segment.x === foodPos.x && segment.z === foodPos.z);
            }

            food = new THREE.Mesh(boxGeo, foodMat);
            food.position.set(foodPos.x, 0.4, foodPos.z);
            scene.add(food);
        }

        function changeDirection(newDir) {
            if (gameOver) return;
            if (newDir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
            if (newDir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
            if (newDir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (newDir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeDirection('UP');
            if (e.key === 'ArrowDown') changeDirection('DOWN');
            if (e.key === 'ArrowLeft') changeDirection('LEFT');
            if (e.key === 'ArrowRight') changeDirection('RIGHT');
        });

        function moveSnake() {
            direction = nextDirection;
            let headX = snakeData[0].x;
            let headZ = snakeData[0].z;

            if (direction === 'UP') headZ -= 1;
            if (direction === 'DOWN') headZ += 1;
            if (direction === 'LEFT') headX -= 1;
            if (direction === 'RIGHT') headX += 1;

            const half = gridSize / 2;
            if (headX >= half || headX <= -half || headZ >= half || headZ <= -half) {
                endGame();
                return;
            }

            if (snakeData.some(seg => seg.x === headX && seg.z === headZ)) {
                endGame();
                return;
            }

            snakeData.unshift({ x: headX, z: headZ });

            if (headX === foodPos.x && headZ === foodPos.z) {
                score++;
                document.getElementById("score").innerText = "النقاط: " + score;
                spawnFood();
                
                const newMesh = new THREE.Mesh(boxGeo, bodyMat);
                scene.add(newMesh);
                snake.push(newMesh);
            } else {
                snakeData.pop();
            }

            for (let i = 0; i < snake.length; i++) {
                snake[i].position.set(snakeData[i].x, 0.4, snakeData[i].z);
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById("status").innerText = "خسرت!";
            document.getElementById("restartBtn").style.display = "block";
        }

        function resetGame() {
            snake.forEach(mesh => scene.remove(mesh));
            snake = [];
            snakeData = [];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            document.getElementById("score").innerText = "النقاط: " + score;
            document.getElementById("status").innerText = "لعبة الثعبان 3D";
            document.getElementById("restartBtn").style.display = "none";
            gameOver = false;
            initGame();
        }

        initGame();

        // حلقة اللعبة المحدثة باستخدام التوقيت القياسي لتجنب مشاكل الـ Lag
        function animate(currentTime) {
            requestAnimationFrame(animate);

            if (!gameOver) {
                if (!lastMoveTime) lastMoveTime = currentTime;
                const elapsed = (currentTime - lastMoveTime) / 1000;

                if (elapsed >= moveInterval) {
                    moveSnake();
                    lastMoveTime = currentTime;
                }
                
                if (food) {
                    food.rotation.y += 0.03;
                }
            }

            renderer.render(scene, camera);
        }

        // إصلاح تمدد الأبعاد عند التدوير
        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        requestAnimationFrame(animate);
    </script>


<script id="admin-scripts">
    const username = "BLOXMAM";
    const repo = "app_ddir";
    const currentFileName = "mix.html";

    function toggleDrawer() {
        const drawer = document.getElementById("drawer");
        const overlay = document.getElementById("drawerOverlay");
        drawer.classList.toggle("open");
        overlay.style.display = drawer.classList.contains("open") ? "block" : "none";
    }

    function renderDrawerContent(orderedPages) {
        const drawerMenu = document.getElementById("drawerDynamicMenu");
        drawerMenu.innerHTML = "";
        const currentPageData = orderedPages.find(p => p.file === currentFileName);
        if (currentPageData && currentPageData.title) {
            document.getElementById("pageMainHeader").innerText = currentPageData.title;
            if(document.getElementById("pageContentTitle")) document.getElementById("pageContentTitle").innerText = currentPageData.title;
            document.title = currentPageData.title;
        }
        orderedPages.forEach(page => {
            const li = document.createElement("li");
            li.className = "drawer-item";
            li.innerHTML = "<span>" + page.title + "</span><span>📖</span>";
            li.onclick = () => {
                if (typeof Android !== "undefined" && Android.openLocalPage) {
                    Android.openLocalPage(page.file);
                } else {
                    window.location.href = page.file;
                }
            };
            drawerMenu.appendChild(li);
        });
    }

    async function initDrawer() {
        const loader = document.getElementById("drawerLoader");
        let loadedSuccessfully = false;
        try {
            if (typeof Android !== "undefined" && Android.readLocalFile) {
                const localData = Android.readLocalFile("order.json");
                if (localData && localData.trim() !== "") {
                    const orderedPages = JSON.parse(localData);
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                }
            }
            if (!loadedSuccessfully) {
                const res = await fetch(`order.json`);
                if (res.ok) {
                    const orderedPages = await res.json();
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                } else { throw new Error(); }
            }
        } catch(e) {
            if (!loadedSuccessfully) {
                try {
                    const resAlt = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/order.json`);
                    const dataAlt = await resAlt.json();
                    const decodedContent = decodeURIComponent(escape(atob(dataAlt.content.replace(/\s/g, ""))));
                    renderDrawerContent(JSON.parse(decodedContent));
                } catch(err) { console.log("خطأ في جلب الهيدر"); }
            }
        } finally {
            if(loader) loader.style.display = "none";
        }
    }
    initDrawer();
</script>
</body>
</html>
