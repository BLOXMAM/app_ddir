<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماك</title>
    <style>
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style id="admin-styles">
        :root {
            --drawer-bg-light: #ffffff;
            --drawer-text-light: #333333;
            --drawer-bg: var(--drawer-bg-light);
            --drawer-text: var(--drawer-text-light);
            --maincolor: #ff0000;
        }
        [data-user-theme="dark"] {
            --drawer-bg-dark: #1e1e1e;
            --drawer-text-dark: #e0e0e0;
            --drawer-bg: var(--drawer-bg-dark);
            --drawer-text: var(--drawer-text-dark);
            --maincolor: #800f;
        }
        body { margin: 0 !important; padding: 0 !important; padding-top: 56px !important; }
        header { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--drawer-bg); height: 56px !important; line-height: 56px !important; padding: 0 15px !important; color: var(--drawer-text); display: flex; align-items: center; justify-content: space-between; width: 100% !important; box-sizing: border-box; direction: rtl; gap: 15px; overflow: hidden !important; transition: background-color 0.3s, color 0.3s; }
        
        .menu-btn-container {
            display: flex; flex-direction: column; justify-content: space-between; width: 24px; height: 18px; background: transparent; border: none; cursor: pointer; padding: 0; transition: transform 0.15s ease;
        }
        .menu-bar-line { width: 100%; height: 3px; background-color: var(--drawer-text); border-radius: 2px; transition: all 0.3s; }
        
        /* تنسيق العنصر الجديد dl123 */
        .dl123 {
            display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 8px;
            cursor: pointer; color: var(--drawer-text); border: 1px solid rgba(255, 255, 255, 0.15);
            transition: background-color 0.2s, transform 0.1s; appearance: none; box-sizing: border-box;
        }
        .dl123:hover { background-color: rgba(0,0,0,0.08); }
        .dl123:active { transform: scale(0.9); }

        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: none; }
        .drawer { position: fixed; top: 0; width: 280px; height: 100%; background: var(--drawer-bg); color: var(--drawer-text); z-index: 1002; transition: all 0.3s; display: flex; flex-direction: column; right: -280px; }
        .drawer.open { right: 0; }
        .drawer-header { padding: 0 15px; height: 56px; line-height: 56px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .drawer-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="menu-btn-container" id="menuBtnToggle" onclick="toggleDrawer()">
            <div class="menu-bar-line"></div>
            <div class="menu-bar-line"></div>
            <div class="menu-bar-line"></div>
        </button>
        <span id="pageMainHeader" style="font-weight:bold;">ماكس</span>
    </div>
    <!-- الزر الجديد -->
    <div class="dl123" id="userThemeToggleBtn" onclick="toggleUserTheme()">
        <i class="fa-solid fa-moon"></i>
    </div>
</header>

<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
    <div class="drawer-header">ماكس</div>
    <div class="drawer-menu-container">
        <ul class="drawer-menu" id="drawerDynamicMenu"></ul>
    </div>
</nav>

<main style="padding: 20px;">
    <h1 id="pageContentTitle">صفحة ماكس</h1>
</main>

<script>
    function initUserTheme() {
        const toggleBtn = document.getElementById("userThemeToggleBtn");
        const saved = localStorage.getItem("user-theme") || "light";
        if(saved === "dark") {
            document.documentElement.setAttribute("data-user-theme", "dark");
            if(toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
            document.documentElement.removeAttribute("data-user-theme");
            if(toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }
    }

    function toggleUserTheme() {
        const toggleBtn = document.getElementById("userThemeToggleBtn");
        const current = document.documentElement.getAttribute("data-user-theme");
        if(current === "dark") {
            document.documentElement.removeAttribute("data-user-theme");
            localStorage.setItem("user-theme", "light");
            if(toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        } else {
            document.documentElement.setAttribute("data-user-theme", "dark");
            localStorage.setItem("user-theme", "dark");
            if(toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }
    }

    function toggleDrawer() {
        const drawer = document.getElementById("drawer");
        const overlay = document.getElementById("drawerOverlay");
        drawer.classList.toggle("open");
        overlay.style.display = drawer.classList.contains("open") ? "block" : "none";
    }

    // تهيئة الثيم عند التحميل
    initUserTheme();
</script>
</body>
</html>
